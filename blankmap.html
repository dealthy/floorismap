<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mapbox Starter</title>

  <!-- Mapbox GL JS -->
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet" />
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
  <script src="config.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Courier New', monospace;
      background: #0a0a0a;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 14px 20px;
      background: #0a0a0a;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 10;
    }

    header h1 {
      font-size: 13px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #888;
      font-weight: normal;
    }

    header span {
      font-size: 13px;
      color: #4af;
      letter-spacing: 0.05em;
    }

    #map {
      flex: 1;
    }

    /* Token warning banner */
    #token-warning {
      position: absolute;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a1a1a;
      border: 1px solid #f84;
      color: #f84;
      padding: 10px 18px;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      letter-spacing: 0.05em;
      z-index: 100;
      display: none;
      border-radius: 2px;
    }

    /* Coordinate display */
    #coords {
      position: absolute;
      bottom: 28px;
      left: 14px;
      background: rgba(10,10,10,0.85);
      border: 1px solid #222;
      padding: 6px 12px;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: #666;
      letter-spacing: 0.05em;
      z-index: 10;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <header>
    <h1>Map</h1>
    <span>·</span>
    <span id="style-label">streets-v12</span>
  </header>

  <div id="map"></div>
  <div id="token-warning">⚠ Replace YOUR_MAPBOX_TOKEN with a valid Mapbox public token</div>
  <div id="coords">lng: — &nbsp; lat: — &nbsp; zoom: —</div>

  <script>
    // ─── CONFIG ────────────────────────────────────────────────
    const MAPBOX_TOKEN = window.MAPBOX_TOKEN || 'YOUR_MAPBOX_TOKEN';   // set in config.js (gitignored)

    const CONFIG = {
      style:  'mapbox://styles/dealthy/cmlq0nglm008x01sf3vvmcqq3', 
      center: [-77.0369, 38.9072],   // Washington DC
      zoom:   10,
    };
    // ────────────────────────────────────────────────────────────

    if (MAPBOX_TOKEN === 'YOUR_MAPBOX_TOKEN') {
      document.getElementById('token-warning').style.display = 'block';
    }

    mapboxgl.accessToken = MAPBOX_TOKEN;

    const map = new mapboxgl.Map({
      container: 'map',
      style: CONFIG.style,
      center: CONFIG.center,
      zoom: CONFIG.zoom,
    });

    // Navigation controls
    map.addControl(new mapboxgl.NavigationControl(), 'top-right');
    map.addControl(new mapboxgl.ScaleControl(), 'bottom-right');

    // Coordinate display
    const coordsEl = document.getElementById('coords');
    map.on('mousemove', (e) => {
      coordsEl.textContent =
        `lng: ${e.lngLat.lng.toFixed(5)}   lat: ${e.lngLat.lat.toFixed(5)}   zoom: ${map.getZoom().toFixed(2)}`;
    });

    // Expose map globally for console tinkering
    window.map = map;
  </script>

</body>
</html>
